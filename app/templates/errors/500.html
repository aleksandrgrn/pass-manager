{% extends 'base.html' %}
{% block title %}500 — Ошибка сервера{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 text-center">
    <h1 class="text-6xl font-bold text-danger">500</h1>
    <p class="mt-4 text-muted">Внутренняя ошибка сервера.</p>
    <p class="mt-2 text-xs text-faint">{{ error }}</p>
    <a href="{{ url_for('servers.list_servers') }}" class="btn secondary mt-6">← На главную</a>
</div>
{% endblock %}

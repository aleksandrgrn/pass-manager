{% extends 'base.html' %}
{% block title %}500 — Ошибка сервера{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 text-center">
    <h1 class="text-6xl font-bold text-red-500">500</h1>
    <p class="mt-4 text-gray-600">Внутренняя ошибка сервера.</p>
    <p class="mt-2 text-xs text-gray-400">{{ error }}</p>
    <a href="{{ url_for('servers.list_servers') }}" class="mt-6 inline-block text-blue-600 hover:text-blue-800">← На главную</a>
</div>
{% endblock %}

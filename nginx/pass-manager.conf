# nginx config for Pass Manager
#
# Deploy on b000860 alongside VPS Manager:
#   /etc/nginx/sites-available/pass-manager.conf -> symlink in sites-enabled
#
# Pass Manager runs on 127.0.0.1:5001 (gunicorn).
# VPS Manager runs on 127.0.0.1:5000 (already configured elsewhere).

upstream pass_manager_backend {
    server 127.0.0.1:5001 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name pass-manager.example.com;  # ← change me

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pass-manager.example.com;  # ← change me

    # SSL (use your real cert paths)
    ssl_certificate     /etc/ssl/certs/pass-manager.pem;
    ssl_certificate_key /etc/ssl/private/pass-manager.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Body limits (CRUD operations are tiny)
    client_max_body_size 1m;

    # Main app
    location / {
        proxy_pass http://pass_manager_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # HTMX long-poll friendly timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # HTMX endpoints (e.g., inline edit, toggle) — slightly stricter
    location /servers/ {
        proxy_pass http://pass_manager_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Access log
    access_log /var/log/nginx/pass-manager_access.log;
    error_log  /var/log/nginx/pass-manager_error.log;
}
